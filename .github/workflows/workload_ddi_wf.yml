---
name: "Workload DDI"

on:
  workflow_call:
    inputs:
      namespace:
        description: "The deployment namespace (alias)"
        required: true
        type: string
      region:
        description: "The deployment region"
        type: string
        required: true
      tp_env:
        description: "The deployment environment"
        type: string
        required: true
      node_types:
        description: "The deployment node types"
        required: true
        type: string
      inventories_branch:
        description: "Override the inventory repository branch"
        required: true
        type: string
      state_branch:
        description: "Override the iaas-state-branch repository branch"
        required: true
        type: string
        default: "staging"
      ansible_debug:
        description: "Choose Ansible Debug Level"
        required: true
        default: '-v'
        type: string
      remove_ddi:
        description: "Remove DDI?"
        required: true
        type: boolean
        default: false

    secrets:
      token:
        description: "The token to use"
        required: true
      ansible_vault_key:
        description: "The Ansible vault encryption key to use"
        required: true

jobs:
  dependencies_prep:
    name: Dependencies prep
    runs-on:
      - self-hosted
      - base-runner
    outputs:
      runner_env: ${{ steps.runner_env.outputs.major_env }}
    steps:
      - name: Checkout this repo
        id: checkout-workflows
        uses: actions/checkout@v5

      - name: Output the runner environment
        id: runner_env
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-major-env@main
        with:
          tp_env: ${{ inputs.tp_env }}

  run_ddi:
    name: Run ddi on workload
    runs-on:
      - self-hosted
      - toolkit-runner
      #      - self-hosted
      #      - "${{ needs.dependencies_prep.outputs.runner_env }}"
      #      - onprem
      #      - toolkit
      #      - podman
    needs: dependencies_prep
    steps:
      - name: Checkout this repo
        id: checkout-workflows
        uses: actions/checkout@v5

      - name: Set deployment path
        id: set-deployment-path
        shell: bash
        run: |
          deployment_path="io/travelport/${{ inputs.tp_env }}/${{ inputs.region }}/${{ inputs.namespace }}"
          echo "deployment_path=${deployment_path}" >> $GITHUB_OUTPUT

      - name: Prepare IAAS ansible workspace
        id: workspace-prep
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-ansible-workspace@main
        with:
          deployment_path: "AnsibleInventories/${{ steps.set-deployment-path.outputs.deployment_path }}"
          node_types: "${{ inputs.node_types }}"
          inventories_branch: ${{ inputs.inventories_branch }}
          token: ${{ secrets.token }}
          ansible_vault_key: ${{ secrets.ansible_vault_key }}

      - name: Lookup the cloud provider
        id: cloud-provider
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-inventory-var@main
        with:
          inventory_path: ${{ steps.workspace-prep.outputs.inventory_path }}
          variable: tp_cloud_provider

      - name: Checkout iaas-app-state repo as terraform_working
        if: ${{ fromJson(steps.cloud-provider.outputs.json-output).msg == 'amazon' }}
        id: checkout-iaas-app-state
        uses: actions/checkout@v5
        with:
          repository: Tvlport-IAAS/iaas-app-state
          token: ${{ secrets.token }}
          path: terraform_working
          ref: ${{ inputs.state_branch }}

      - name: Perform DDI Operations
        if: ${{ !inputs.remove_ddi }}
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-ansible-run@main
        with:
          inventory_path: "${{ steps.workspace-prep.outputs.inventory_path }}"
          node_types: "${{ inputs.node_types }}"
          playbook: "Pipelines/playbooks/customer/ddi_providers/DDI.yml"
          ansible_debug: ${{ inputs.ansible_debug }}

      - name: Cleanup DNS Entries
        if: ${{ inputs.remove_ddi }}
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-ansible-run@main
        with:
          inventory_path: "${{ steps.workspace-prep.outputs.inventory_path }}"
          node_types: "${{ inputs.node_types }}"
          playbook: "Pipelines/playbooks/customer/ddi_providers/iaas_testing-Remove_DNS_Entries.yml"
          ansible_debug: ${{ inputs.ansible_debug }}

      - name: Build commit message
        id: commit-message
        shell: bash
        run: |
          repo=$(echo "${{ github.repository }}" | cut -d '/' -f2)
          message="${repo}#${{ github.run_number }} - TF working push to staging"
          echo "message=${message}" >> $GITHUB_OUTPUT

      - name: Push changes to state repo on ${{ inputs.state_branch }} branch
        id: push-iaas-app-state
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-git-push@main
        with:
          commit_message: "${{ steps.commit-message.outputs.message }}"
          path: ./terraform_working
          destination_branch: ${{ inputs.state_branch }}
          access_token: ${{ secrets.token }}
          force: true

      - name: Cleanup private keys
        id: cleanup-keys
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-keys-cleanup@main
