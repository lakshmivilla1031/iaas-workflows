---
name: "Yaml Linter"

on:
  workflow_call:

jobs:
  run_yaml_linter:
    runs-on:
      - self-hosted
      - testing-runner

    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v32.1.2
        with:
          files: "**/*.yml"
          files_ignore: "./.github/**/*"

      - name: Run YAML-Lint
        if: steps.changed-files.outputs.any_changed
        uses: Tvlport-IAAS/iaas-workflows/actions/iaas-yaml-linter@main
        with:
          files: ${{ steps.changed-files.outputs.all_changed_files }}
