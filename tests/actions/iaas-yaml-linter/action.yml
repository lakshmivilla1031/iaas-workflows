---
name: 'IaaS yaml linter'
description: 'Composite action used to prepare the IAAS Ansible workspace'
inputs:
  paths:
    description: "The list of paths / file patterns"
    required: true

runs:
  using: "composite"
  steps:
    - name: Glob match
      uses: tj-actions/glob@v22.0.1
      id: glob
      with:
        files: ${{ inputs.paths }}

    - name: Run yaml linter in workspace
      id: yaml-linter
      shell: bash
      run: |
        chmod a+x ${GITHUB_ACTION_PATH}/script.sh
        ${GITHUB_ACTION_PATH}/script.sh ${{ steps.glob.outputs.paths }}
