---
name: 'IAAS Inventory Variable'
description: 'Composite action used to run Ansible within IAAS requirements'
inputs:
  inventory_path:
    description: "The inventory deployment file"
    required: true
  variable:
    description: "The variable to return"
    required: true
outputs:
  json-output:
    description: "The variable output as json"
    value: ${{ steps.inventory-var.outputs.json-output }}

runs:
  using: "composite"
  steps:
    - name: Run post provisioning playbook
      id: inventory-var
      shell: bash
      run: |
        date +%Y%m%d-%H%M%S
        json=$(ansible --vault-password=~/.vp -i ${{ inputs.inventory_path }} \
          all[0] -m debug -a 'msg="{{ ${{ inputs.variable }} | default({}) }}"' | \
          sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2})?)?[mGK]//g" | cut -d '>' -f2 | jq -c '.')
        echo "json-output=${json}" >> $GITHUB_OUTPUT
